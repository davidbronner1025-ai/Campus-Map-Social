openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Campus Social Network Admin API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: campus
  - name: locations
  - name: announcements
  - name: schedules
  - name: menus
  - name: sports
  - name: users
  - name: events

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /campus:
    get:
      operationId: getCampus
      tags: [campus]
      summary: Get campus configuration
      responses:
        "200":
          description: Campus configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campus"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: setCampus
      tags: [campus]
      summary: Set or update campus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCampusRequest"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campus"

  /locations:
    get:
      operationId: getLocations
      tags: [locations]
      summary: Get all campus locations
      responses:
        "200":
          description: Locations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Location"
    post:
      operationId: createLocation
      tags: [locations]
      summary: Create a new location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"

  /locations/{locationId}:
    get:
      operationId: getLocation
      tags: [locations]
      summary: Get a single location
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateLocation
      tags: [locations]
      summary: Update a location
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLocation
      tags: [locations]
      summary: Delete a location
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /locations/{locationId}/announcements:
    get:
      operationId: getAnnouncements
      tags: [announcements]
      summary: Get announcements for a location
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create announcement
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{announcementId}:
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete announcement
      parameters:
        - name: announcementId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /locations/{locationId}/schedules:
    get:
      operationId: getSchedules
      tags: [schedules]
      summary: Get schedules for a location (building)
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleEntry"
    post:
      operationId: createScheduleEntry
      tags: [schedules]
      summary: Create a schedule entry
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleEntryRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleEntry"

  /schedules/{scheduleId}:
    delete:
      operationId: deleteScheduleEntry
      tags: [schedules]
      summary: Delete schedule entry
      parameters:
        - name: scheduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /locations/{locationId}/menus:
    get:
      operationId: getMenus
      tags: [menus]
      summary: Get daily menus for a dining location
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Menus
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyMenu"
    post:
      operationId: createMenu
      tags: [menus]
      summary: Create or update today's menu
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyMenu"

  /menus/{menuId}/rate:
    post:
      operationId: rateMenu
      tags: [menus]
      summary: Rate today's menu
      parameters:
        - name: menuId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RateMenuRequest"
      responses:
        "200":
          description: Rating saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /locations/{locationId}/games:
    get:
      operationId: getGames
      tags: [sports]
      summary: Get game sessions for a sports location
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Game sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameSession"
    post:
      operationId: createGame
      tags: [sports]
      summary: Create a game session
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGameRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSession"

  /games/{gameId}:
    delete:
      operationId: deleteGame
      tags: [sports]
      summary: Delete a game session
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/nearby:
    get:
      operationId: getNearbyUsers
      tags: [users]
      summary: Get visible users within radius
      security:
        - bearerAuth: []
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lng
          in: query
          required: true
          schema:
            type: number
        - name: radius
          in: query
          required: false
          schema:
            type: number
            default: 500
      responses:
        "200":
          description: List of nearby visible users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NearbyUser"
        "400":
          description: Missing lat/lng
        "429":
          description: Rate limit exceeded

  /me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /games/{gameId}/vote:
    post:
      operationId: voteForGame
      tags: [sports]
      summary: Vote to join a game session
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteGameRequest"
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /events/nearby:
    get:
      operationId: getNearbyEvents
      tags: [events]
      summary: Get upcoming events within radius
      security:
        - bearerAuth: []
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lng
          in: query
          required: true
          schema:
            type: number
        - name: radius
          in: query
          required: false
          schema:
            type: number
            default: 1000
      responses:
        "200":
          description: List of nearby upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NearbyEvent"
        "400":
          description: Missing lat/lng

  /events:
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event (auto-RSVPs creator)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventRow"
        "400":
          description: Validation error

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get single event detail
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event with RSVP list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NearbyEvent"
        "404":
          description: Not found
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete own event
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
        "403":
          description: Not the event creator
        "404":
          description: Not found

  /events/{id}/rsvp:
    post:
      operationId: rsvpEvent
      tags: [events]
      summary: Join an event
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: RSVP result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  status:
                    type: string
                    enum: [joined, already_joined]
                required: [ok, status]
        "400":
          description: Event is full
        "404":
          description: Not found
    delete:
      operationId: unrsvpEvent
      tags: [events]
      summary: Leave an event
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Left event
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  status:
                    type: string
                    enum: [left]
                required: [ok, status]

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    Campus:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        defaultZoom:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, lat, lng, defaultZoom]

    SetCampusRequest:
      type: object
      properties:
        name:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        defaultZoom:
          type: integer
          default: 17
      required: [name, lat, lng]

    LocationType:
      type: string
      enum:
        - building
        - dining_hall
        - sports_field
        - parking
        - green
        - other
      description: Type of location

    LatLng:
      type: object
      properties:
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
      required: [lat, lng]

    Location:
      type: object
      properties:
        id:
          type: integer
        campusId:
          type: integer
        name:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/LocationType"
        color:
          type: string
        adminName:
          type: string
        managerId:
          type: integer
          nullable: true
          description: User ID of the assigned location manager
        managerName:
          type: string
          description: Display name of the assigned manager (joined from users)
        managerPhone:
          type: string
          description: Phone of the assigned manager (joined from users)
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        polygon:
          type: array
          items:
            $ref: "#/components/schemas/LatLng"
        osmName:
          type: string
          description: Building name detected from OpenStreetMap
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, campusId, name, type, color, lat, lng, polygon]

    CreateLocationRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/LocationType"
        color:
          type: string
          default: "#6366f1"
        adminName:
          type: string
        managerId:
          type: integer
          nullable: true
          description: User ID to assign as location manager
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        polygon:
          type: array
          items:
            $ref: "#/components/schemas/LatLng"
        osmName:
          type: string
      required: [name, type, lat, lng, polygon]

    Announcement:
      type: object
      properties:
        id:
          type: integer
        locationId:
          type: integer
        title:
          type: string
        content:
          type: string
        priority:
          type: string
          enum: [normal, important, urgent]
        createdAt:
          type: string
          format: date-time
      required: [id, locationId, title, content, priority, createdAt]

    CreateAnnouncementRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        priority:
          type: string
          enum: [normal, important, urgent]
          default: normal
      required: [title, content]

    DayOfWeek:
      type: string
      enum: [sunday, monday, tuesday, wednesday, thursday, friday, saturday]

    ScheduleEntry:
      type: object
      properties:
        id:
          type: integer
        locationId:
          type: integer
        dayOfWeek:
          $ref: "#/components/schemas/DayOfWeek"
        startTime:
          type: string
          description: "HH:MM format"
        endTime:
          type: string
          description: "HH:MM format"
        label:
          type: string
          description: Course/event name
        instructor:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, locationId, dayOfWeek, startTime, endTime, label]

    CreateScheduleEntryRequest:
      type: object
      properties:
        dayOfWeek:
          $ref: "#/components/schemas/DayOfWeek"
        startTime:
          type: string
        endTime:
          type: string
        label:
          type: string
        instructor:
          type: string
      required: [dayOfWeek, startTime, endTime, label]

    DailyMenu:
      type: object
      properties:
        id:
          type: integer
        locationId:
          type: integer
        date:
          type: string
          format: date
        items:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              category:
                type: string
                enum: [starter, main, side, dessert, drink]
            required: [name, category]
        averageRating:
          type: number
          format: float
        ratingCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, locationId, date, items, averageRating, ratingCount]

    CreateMenuRequest:
      type: object
      properties:
        date:
          type: string
          format: date
        items:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              category:
                type: string
                enum: [starter, main, side, dessert, drink]
            required: [name, category]
      required: [date, items]

    RateMenuRequest:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        raterName:
          type: string
      required: [rating]

    GameSession:
      type: object
      properties:
        id:
          type: integer
        locationId:
          type: integer
        sport:
          type: string
          enum: [football, basketball, volleyball, tennis, other]
        scheduledAt:
          type: string
          format: date-time
        description:
          type: string
        maxPlayers:
          type: integer
        votes:
          type: array
          items:
            type: object
            properties:
              playerName:
                type: string
              votedAt:
                type: string
                format: date-time
            required: [playerName, votedAt]
        createdAt:
          type: string
          format: date-time
      required: [id, locationId, sport, scheduledAt, votes]

    CreateGameRequest:
      type: object
      properties:
        sport:
          type: string
          enum: [football, basketball, volleyball, tennis, other]
        scheduledAt:
          type: string
          format: date-time
        description:
          type: string
        maxPlayers:
          type: integer
          default: 10
      required: [sport, scheduledAt]

    VoteGameRequest:
      type: object
      properties:
        playerName:
          type: string
      required: [playerName]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        phone:
          type: string
        displayName:
          type: string
        title:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        bannerUrl:
          type: string
          nullable: true
        bannerColor:
          type: string
        visibility:
          type: string
          enum: [campus, ghost]
          default: campus
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        lastSeen:
          type: string
          format: date-time
          nullable: true
      required: [id, phone, displayName, bannerColor, visibility]

    UpdateUserRequest:
      type: object
      properties:
        displayName:
          type: string
        title:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        bannerUrl:
          type: string
          nullable: true
        bannerColor:
          type: string
        visibility:
          type: string
          enum: [campus, ghost]

    NearbyUser:
      type: object
      properties:
        id:
          type: integer
        displayName:
          type: string
        title:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        bannerColor:
          type: string
        visibility:
          type: string
        lat:
          type: number
        lng:
          type: number
        lastSeen:
          type: string
          format: date-time
          nullable: true
        active:
          type: boolean
      required: [id, displayName, bannerColor, visibility, lat, lng, active]

    EventCategory:
      type: string
      enum: [study_group, party, sports, club_meeting, food, other]

    EventCreator:
      type: object
      properties:
        id:
          type: integer
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        bannerColor:
          type: string
      required: [id, displayName, bannerColor]

    EventRsvpUser:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
      required: [id, userId]

    EventRow:
      type: object
      properties:
        id:
          type: integer
        creatorId:
          type: integer
        locationId:
          type: integer
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          $ref: "#/components/schemas/EventCategory"
        lat:
          type: number
        lng:
          type: number
        startsAt:
          type: string
          format: date-time
        maxParticipants:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, creatorId, title, category, lat, lng, startsAt, createdAt]

    NearbyEvent:
      type: object
      allOf:
        - $ref: "#/components/schemas/EventRow"
        - type: object
          properties:
            creator:
              $ref: "#/components/schemas/EventCreator"
              nullable: true
            rsvpCount:
              type: integer
            rsvps:
              type: array
              items:
                $ref: "#/components/schemas/EventRsvpUser"
            distance:
              type: integer
          required: [rsvpCount, rsvps]

    CreateEventBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          $ref: "#/components/schemas/EventCategory"
        lat:
          type: number
        lng:
          type: number
        startsAt:
          type: string
          format: date-time
        maxParticipants:
          type: integer
        locationId:
          type: integer
      required: [title, lat, lng, startsAt]

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
